syntax = "proto3";

import "BackupManga.proto";
import "BackupCategory.proto";
import "BackupAnime.proto";
import "BackupSource.proto";

message BackupAniyomi {
    repeated BackupManga backupManga = 1;
    repeated BackupCategory backupCategories = 2;

    // Legacy Aniyomi backups stored anime fields alongside the Mihon fields.
    repeated BackupAnime legacyBackupAnime = 3;
    repeated BackupCategory legacyBackupAnimeCategories = 4;

    repeated BackupSource backupSources = 101;
    repeated BackupSource legacyBackupAnimeSources = 103;

    // New Aniyomi backups moved Aniyomi-only fields to a separate range.
    bool isLegacy = 500;
    repeated BackupAnime backupAnime = 501;
    repeated BackupCategory backupAnimeCategories = 502;
    repeated BackupSource backupAnimeSources = 503;
}
